<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- TV/Monitor frame -->
  <rect x="100" y="40" width="600" height="380" rx="20" fill="#1e293b" stroke="#00D084" stroke-width="3"/>
  <!-- Screen -->
  <rect x="120" y="60" width="560" height="340" rx="10" fill="#0f172a"/>
  <!-- Screen content - gradient -->
  <defs>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D084" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect x="120" y="60" width="560" height="340" rx="10" fill="url(#screenGrad)"/>
  <!-- Play button -->
  <circle cx="400" cy="230" r="40" fill="#00D084" fill-opacity="0.9"/>
  <polygon points="390,210 390,250 420,230" fill="white"/>
  <!-- Channel grid indicators -->
  <rect x="150" y="90" width="80" height="50" rx="6" fill="#334155" opacity="0.6"/>
  <rect x="240" y="90" width="80" height="50" rx="6" fill="#334155" opacity="0.6"/>
  <rect x="330" y="90" width="80" height="50" rx="6" fill="#334155" opacity="0.6"/>
  <rect x="420" y="90" width="80" height="50" rx="6" fill="#334155" opacity="0.6"/>
  <rect x="510" y="90" width="80" height="50" rx="6" fill="#334155" opacity="0.6"/>
  <rect x="600" y="90" width="60" height="50" rx="6" fill="#334155" opacity="0.6"/>
  <!-- Progress bar -->
  <rect x="150" y="360" width="500" height="4" rx="2" fill="#334155"/>
  <rect x="150" y="360" width="200" height="4" rx="2" fill="#00D084"/>
  <!-- TV Stand -->
  <rect x="340" y="420" width="120" height="15" rx="4" fill="#1e293b"/>
  <rect x="300" y="435" width="200" height="8" rx="4" fill="#334155"/>
  <!-- Phone floating right -->
  <g transform="translate(620, 280) rotate(10)">
    <rect width="70" height="130" rx="12" fill="#1e293b" stroke="#00D084" stroke-width="2"/>
    <rect x="6" y="15" width="58" height="95" rx="4" fill="#0f172a"/>
    <rect x="6" y="15" width="58" height="95" rx="4" fill="url(#screenGrad)" opacity="0.5"/>
    <circle cx="35" cy="120" r="4" fill="#334155"/>
  </g>
  <!-- Tablet floating left -->
  <g transform="translate(30, 200) rotate(-8)">
    <rect width="120" height="170" rx="14" fill="#1e293b" stroke="#00D084" stroke-width="2"/>
    <rect x="8" y="16" width="104" height="138" rx="6" fill="#0f172a"/>
    <rect x="8" y="16" width="104" height="138" rx="6" fill="url(#screenGrad)" opacity="0.5"/>
  </g>
  <!-- WiFi signal icon top-right -->
  <g transform="translate(680, 30)">
    <path d="M40 55 C25 40, 10 40, -5 55" stroke="#00D084" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M35 48 C25 40, 15 40, 5 48" stroke="#00D084" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M30 41 C25 38, 15 38, 10 41" stroke="#00D084" stroke-width="2.5" fill="none" opacity="0.8"/>
    <circle cx="20" cy="55" r="3" fill="#00D084"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="4" fill="#00D084" opacity="0.3"/>
  <circle cx="750" cy="100" r="6" fill="#00D084" opacity="0.2"/>
  <circle cx="70" cy="500" r="5" fill="#00D084" opacity="0.25"/>
  <circle cx="730" cy="450" r="3" fill="#00D084" opacity="0.3"/>
</svg>
